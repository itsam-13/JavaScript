<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Async Dog Fetcher</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1>Async Dog Fetcher</h1>
        <p>Demonstrates async/await and parallel requests with <code>Promise.all</code>.</p>
        <div class="controls">
            <button id="fetchBtn">Fetch Random Dog</button>
            <button id="fetch3Btn">Fetch 3 Dogs (Parallel)</button>
        </div>
        <p id="status" class="status"></p>
        <div id="gallery" class="gallery"></div>
    </main>
    <script src="script.js"></script>
</body>

</html>
