<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body{
            width: 100%;
            height: 100%;
        }

        input{
            display: block;
        }

        #main{
            padding: 30px;
            width: 100%;
            height: 100%;
            background-color: #222;
        }

        .card{
            max-width: 400px;
            margin-top: 4px;
            color: azure;
            padding: 20px;
            border-radius: 10px ;
            border: 1px solid #555;
            display: inline-block;
        }
        .profile{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card p{
            font-size: 12px;
            margin-top: 10px;
        }
        .card h5{
            margin-top: 5px;
        }


    </style>
</head>
<body>

    <div id="main">
        <form action="">
            <input type="text" placeholder="Profilepic">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Occupation">
            <input type="text" placeholder="info">
            <input type="Submit" placeholder="">
        </form>
